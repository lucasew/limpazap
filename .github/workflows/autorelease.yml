name: autorelease

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install
        run: mise run install

      - name: Setup Android SDK
        run: mise run setup-androidsdk

      - name: Codegen
        run: mise run codegen

      - name: Check for changes
        id: git_diff
        run: |
          git diff --exit-code || echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Create PR if changes
        if: steps.git_diff.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated code"
          title: "chore: update generated code"
          body: "This PR updates generated code."
          branch: "chore/codegen-update"
          base: ${{ github.ref_name }}

      - name: CI
        run: mise run ci

      - name: Build Artifacts
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/bundle/release/app-release.aab
