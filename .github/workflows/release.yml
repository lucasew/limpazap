name: release

# Builds release APK + AAB.
# Triggers on pushes to master/main, pull requests, workflow_dispatch, and version tags (v*).
# The built files are uploaded as workflow artifacts (downloadable from the Actions run).
#
# No GitHub Releases are ever created.
#
# For F-Droid: once fdroiddata has AutoUpdateMode + UpdateCheckMode: Tags
# (which it apparently does for this app), new `vX.Y.Z` tags are automatically
# picked up. The Cut Release workflow is the only manual step needed.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup environment
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Setup the Android SDK part that sucks
        run: mise run setup-androidsdk

      - run: flutter pub get
      - run: flutter pub run flutter_launcher_icons:main
      # - run: flutter test
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Upload APK and AAB as workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: limpazap-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90
