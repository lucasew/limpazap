# This is a basic workflow to help you get started with Actions

name: release
on: push
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Setup environment
      uses: jdx/mise-action@50831e127353974d62b322a36b30607ce77494d1 # v2.1.11
      
    - name: Setup the Android SDK part that sucks
      run: mise run setup-androidsdk

    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
      id: extract_branch
      
    - run: flutter pub get
    - run: flutter pub run flutter_launcher_icons:main
#    - run: flutter test
    - run: flutter build apk --release
    - run: flutter build appbundle --release
      
    - name: Create a Release APK
      uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1
      with:
        artifacts: "build/app/outputs/bundle/release/app-release.aab,build/app/outputs/flutter-apk/app-release.apk"
        name: Compilação automática ${{ github.sha }} para branch ${{ steps.extract_branch.outputs.branch }}
        token: ${{ secrets.GITHUB_TOKEN }}
        commit: ${{ steps.extract_branch.outputs.branch }}
        tag: commit-${{ github.sha }}
        draft: true
        prerelease: true
