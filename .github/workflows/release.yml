name: release

# Builds release APK + AAB.
# Triggers on pushes to master/main, pull requests, workflow_dispatch, and version tags (v*).
# The built files are uploaded as workflow artifacts (downloadable from the Actions run).
# No GitHub Releases are ever created — F-Droid (which builds from source using tags) is the primary distribution path.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup environment
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Setup the Android SDK part that sucks
        run: mise run setup-androidsdk

      - run: flutter pub get
      - run: flutter pub run flutter_launcher_icons:main
      # - run: flutter test
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Upload APK and AAB as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: limpazap-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90
