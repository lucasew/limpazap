[tools]
android-sdk = "11.0"
flutter = "3.27.1-stable"
java = "17"
usage = "2.12.0"
yq = "4.50.1"
shfmt = "3.12.0"
shellcheck = "0.11.0"
actionlint = "1.7.10"
dprint = "0.51.1"
"npm:prettier" = "3.4.2"

[tasks."install:androidsdk"]
run = '''
yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest" "platform-tools"
yes | flutter doctor --android-licenses
flutter config --android-sdk $ANDROID_HOME
'''
description = "Install Android SDK components and accept licenses"

[tasks."install:flutter"]
run = '''
flutter config --no-analytics
flutter pub get
'''
description = "Install Flutter dependencies"

[tasks.install]
depends = ["install:*"]
description = "Install all dependencies"

[tasks.setup-androidsdk]
depends = ["install:androidsdk"]
description = "Alias for install:androidsdk"

[tasks."codegen:icons"]
run = "dart run flutter_launcher_icons"
description = "Generate app icons"

[tasks.codegen]
depends = ["codegen:*"]
description = "Run all codegen tasks"

[tasks."build:apk"]
run = "flutter build apk --release"
description = "Build Release APK"

[tasks."build:aab"]
run = "flutter build appbundle --release"
description = "Build Release App Bundle"

[tasks."fmt:dart"]
run = "dart format ."
description = "Format Dart files"

[tasks."fmt:sh"]
run = "shfmt -w create_backup"
description = "Format Bash scripts"

[tasks."fmt:md"]
run = "dprint fmt"
description = "Format Markdown files"

[tasks."fmt:yaml"]
run = "prettier --write \"**/*.yaml\""
description = "Format YAML files"

[tasks.fmt]
depends = ["fmt:*"]
description = "Format all files"

[tasks."lint:dart"]
run = "flutter analyze"
description = "Lint Dart files"

[tasks."lint:sh"]
run = "shellcheck create_backup"
description = "Lint Bash scripts"

[tasks."lint:action"]
run = "actionlint"
description = "Lint GitHub Actions"

[tasks.lint]
depends = ["install", "lint:*"]
description = "Lint all files"

[tasks.test]
depends = ["install"]
run = "flutter test"
description = "Run tests"

[tasks.ci]
depends = ["lint", "test"]
description = "CI pipeline"
